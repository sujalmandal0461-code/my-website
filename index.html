<!DOCTYPE html>
<html>
<head>
  <title>Royal Salon Booking</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(120deg, #f6f6f6, #dff6ff);
      animation: fadeIn 1s ease-in;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .title {
      font-size: 24px;
      font-weight: bold;
      margin-top: 15px;
      animation: slideDown 1s ease;
    }

    @keyframes slideDown {
      from {transform: translateY(-50px); opacity: 0;}
      to {transform: translateY(0); opacity: 1;}
    }

    .address {
      color: gray;
      margin-bottom: 10px;
      animation: fadeIn 2s ease;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 20px auto;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      animation: zoomIn 1s ease;
    }

    @keyframes zoomIn {
      from {transform: scale(0.8); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 8px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 10px;
      width: 100%;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: darkgreen;
      transform: scale(1.05);
    }

    .seat {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      background: #ddd;
      cursor: pointer;
      border-radius: 5px;
      transition: 0.3s;
    }

    .seat:hover {
      transform: scale(1.1);
    }

    .selected {
      background: orange;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<div class="title">💈 Royal Salon Booking System</div>
<div class="address">📍 Chandrapur, Maharashtra</div>

<div class="box">

  <input type="text" id="name" placeholder="Enter Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="time" id="time">

  <h4>Select Seat</h4>
  <div id="seats"></div>

  <button onclick="bookSeat()">Book Seat</button>

</div>

<script>
let selectedSeat = "";

for(let i=1; i<=9; i++){
  let div = document.createElement("div");
  div.className = "seat";
  div.innerText = i;

  div.onclick = function(){
    let all = document.querySelectorAll(".seat");
    all.forEach(s => s.classList.remove("selected"));
    div.classList.add("selected");
    selectedSeat = i;
  }

  document.getElementById("seats").appendChild(div);
}

function bookSeat(){
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let time = document.getElementById("time").value;

  if(name=="" || phone=="" || time=="" || selectedSeat==""){
    alert("❌ Sab fill karo bhai!");
    return;
  }

  alert("💈 Booking Confirmed!\nName: "+name+"\nSeat: "+selectedSeat);

  if(Notification.permission === "granted"){
    new Notification("💈 Salon Booking", {
      body: name + " ne seat " + selectedSeat + " book ki hai"
    });
  }
}
</script>

</body>
</html>
