<!DOCTYPE html>
<html>
<head>
    <link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seat Booking</title>

<style>
body {
    <script>
function askNotificationPermission() {
    if ("Notification" in window) {
        Notification.requestPermission();
    }
}

window.onload = askNotificationPermission;
</script>
    font-family: Arial;
    text-align: center;
    padding: 20px;
    background: #f5f5f5;
}

h1 {
    margin-bottom: 20px;
}

/* Seats layout */
.seats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 250px;
    margin: auto;
}

/* Seat box */
.seat {
    padding: 15px;
    background: lightgray;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

.seat:hover {
    transform: scale(1.1);
}

.seat.selected {
    background: green;
    color: white;
}

/* Button */
button {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    background: blue;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: darkblue;
}

/* Toast notification */
#toast {
    visibility: hidden;
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    padding: 12px;
    border-radius: 8px;
    font-size: 14px;
}

#toast.show {
    visibility: visible;
}
</style>

</head>

<body>

<h1>🎟 Seat Booking System</h1>
<p>Select your seats 👇</p>

<div class="seats">
    <div class="seat">1</div>
    <div class="seat">2</div>
    
</div>

<button onclick="bookSeat()">Book Seats</button>

<div id="toast"></div>

<script>
// seat click
document.querySelectorAll(".seat").forEach(seat => {
    seat.addEventListener("click", function () {
        this.classList.toggle("selected");
    });
});

// booking function
function bookSeat() {
    let selected = document.querySelectorAll(".seat.selected");
    let toast = document.getElementById("toast");

    if(selected.length === 0){
        showToast("⚠️ Please select seat first!");
    } else {
        showToast("🎟 " + selected.length + " seat booked successfully!");
    }
}

// toast function
function showToast(msg){
    let toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.classList.add("show");

    setTimeout(() => {
        toast.classList.remove("show");
    }, 2000);
}
</script>

</body>
</html>
